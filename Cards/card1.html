<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            height: 100vh;
            width: 100%;
            min-height: 300px;
            background-image: linear-gradient(#f1c38f, #f8649b);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card{
            height: 600px;
            width: 350px;
            background: #ffffff;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            /* justify-content: center; */
            align-items: center;
            gap: 30px;
            padding: 35px;
        }
        .card img{
            height: 57%;
            border-radius: 10px;
        }
        .card h2{
            font-weight: bold;
        }
        p{
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlUVlAqHcErMYokwKOgP20WNOlO29zrgpCQveuU6qFwVzYnvHYZF9JxTw&s=10" alt="">
            <h2>Lorem ipsum dolor sit amet consectetur adipisicing elit. Aliquid, fugiat.</h2>
            <p>L amet consectetures dolorem ipsa placeat ea enim. Voluptatibus blanditiis laborum at iure aspernatur dolore. Magnam placeat voluptate magni eos maxime! <p>
        </div>
    </div>
</body>
</html>
